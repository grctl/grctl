name: Nightly

on:
  schedule:
    - cron: "0 2 * * *" # Every night at 02:00 UTC
  workflow_dispatch: # Allows manual trigger for testing the workflow

permissions:
  contents: read

jobs:
  cross-platform-build:
    name: Cross-platform Server Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Install tools with mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Build all platforms
        run: mise run dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: grctl-all-platforms
          path: dist/

      - name: Publish nightly pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true
          git tag -d nightly 2>/dev/null || true
          gh release create nightly \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Nightly Build ($(date -u '+%Y-%m-%d'))" \
            --notes "Latest nightly build from main. Not intended for production use." \
            dist/*
