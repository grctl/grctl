[tasks.build]
description = "Build grctld (server) and grctl (CLI) binaries"
run = """
VERSION=$(git describe --tags --always --dirty --match "v[0-9]*" 2>/dev/null || echo "dev")
COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

echo "Building grctld (server daemon)..."
go build -ldflags="${LDFLAGS}" -o bin/grctld ./grctld
echo "Binary: bin/grctld"
echo "Building grctl (CLI)..."
go build -ldflags="${LDFLAGS}" -o bin/grctl ./grctl
echo "Binary: bin/grctl"
"""

[tasks.dist]
description = "Build cross-platform release archives to dist/"
run = """
#!/usr/bin/env bash
VERSION=$(git describe --tags --always --dirty --match "v[0-9]*" 2>/dev/null || echo "dev")
COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

mkdir -p dist
platforms=("linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64")
for platform in "${platforms[@]}"; do
  IFS='/' read -r GOOS GOARCH <<< "$platform"
  ext=""
  if [ "$GOOS" == "windows" ]; then ext=".exe"; fi

  echo "Building for $GOOS/$GOARCH..."
  GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="${LDFLAGS}" -o "dist/grctld${ext}" ./grctld
  GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="${LDFLAGS}" -o "dist/grctl${ext}" ./grctl

  if [ "$GOOS" == "windows" ]; then
    zip "dist/grctl-$GOOS-$GOARCH.zip" "dist/grctld${ext}" "dist/grctl${ext}"
  else
    tar -czvf "dist/grctl-$GOOS-$GOARCH.tar.gz" -C dist "grctld" "grctl"
  fi
  rm "dist/grctld${ext}" "dist/grctl${ext}"
done
"""

[tasks.start]
description = "Build and run the server daemon"
depends = ["build"]
run = "./bin/grctld -l debug"

[tasks.dev]
description = "Run with auto-reload (air)"
run = "air"

[tasks.test]
description = "Run tests"
run = "go test -v ./..."

[tasks.lint]
description = "Run linter"
run = "golangci-lint run --timeout=5m ./..."

[tasks.fmt]
description = "Format code"
run = "gofmt -s -w ."

[tasks.tidy]
description = "Tidy go.mod"
run = "go mod tidy"

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf bin/ tmp/ build-errors.log"

[tasks.check]
description = "Check code"
depends = ["fmt", "lint", "tidy"]
